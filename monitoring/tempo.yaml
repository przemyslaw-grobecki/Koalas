server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: zoo-management
  storage:
    path: /tmp/tempo/generator/wal
    remote_write: {}
  traces_storage:
    path: /tmp/tempo/generator/traces

storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/traces

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]